# Checkov gate config. Skips below are ACCEPTED RISKS, each a deliberate
# cost/benefit call for a public demo portfolio with a hard "idle ≈ $0"
# budget rule (see CLAUDE.md). Anything not listed here fails the build.
# Revisit if any plank starts handling real (non-demo) data.

framework:
  - terraform
quiet: true
compact: true

skip-check:
  # --- would require always-on paid infrastructure ---
  # (CKV_AWS_68 retired 2026-07-20: every CloudFront distribution now carries the
  #  shared platform-edge-acl — one ~$8/mo web ACL for the whole portfolio.)
  - CKV2_AWS_47 # Log4j protection IS attached (Known Bad Inputs rule group on platform-edge-acl), but the ACL lives in the platform root — the per-directory graph scan can't cross Terraform roots to see it
  - CKV2_AWS_29 # WAF on the REST API stage itself: the public path is covered by the edge ACL via CloudFront; a second REGIONAL ACL for the direct execute-api endpoint would be another ~$8/mo (app-layer keys/plans still meter that path)
  - CKV2_AWS_31 # WAF logging: log delivery (Firehose/CloudWatch) is where WAF costs hide; free sampled requests + CloudWatch metrics are enough for a demo portfolio
  - CKV_AWS_120 # API Gateway cache cluster: $14+/mo always-on; the API is free-tier Lambda+DynamoDB reads
  - CKV_AWS_225 # method-settings caching: same cache cluster cost as CKV_AWS_120
  - CKV_AWS_117 # Lambda in VPC: would force NAT gateways (banned always-on cost); no VPC resources exist
  - CKV_AWS_144 # S3 cross-region replication: doubles storage for reproducible demo assets
  - CKV_AWS_310 # CloudFront origin failover: second origin for static demo sites isn't worth it

  # --- KMS CMKs are $1/mo each; AWS-managed encryption is on everywhere ---
  - CKV_AWS_145 # S3 KMS-by-default (SSE-S3 enabled instead)
  - CKV_AWS_173 # Lambda env-var CMK (no secrets in env vars; AWS-managed key encrypts at rest)
  - CKV_AWS_119 # DynamoDB CMK (AWS-owned key encryption is always on)
  - CKV_AWS_26 # SNS topic CMK (alarm + demo fan-out topics; neither CloudWatch nor EventBridge can publish through aws/sns)
  - CKV_AWS_297 # EventBridge Scheduler CMK (payloads: an empty reset event, a fictional heartbeat request)
  - CKV_AWS_158 # CloudWatch log group CMK (workflow error logs for fictional demo events; AWS-managed encryption is on by default)
  - CKV_AWS_136 # ECR repo CMK (demo job image built from public source; AES256 encryption is on)
  - CKV_AWS_337 # SSM SecureString CMK (plank 11's discovery params — ARNs and a database name — encrypted with the aws/ssm managed key)
  - CKV_AWS_149 # Secrets Manager CMK (plank 11's app-user secret is AWS-managed-key encrypted, regenerated every demo cycle, destroyed at teardown)

  # --- logging/eventing surfaces that cost more than the sites they'd watch ---
  - CKV_AWS_65 # ECS Container Insights: per-metric charges for a cluster that runs ~2 min of tasks a day; awslogs + the run-trace table cover it
  - CKV_AWS_18 # S3 access logging (CloudFront metrics cover the static sites)
  - CKV_AWS_86 # CloudFront access logging (standard logs bucket + storage)
  - CKV_AWS_76 # API Gateway access logging (Lambda logs cover request-level detail)
  - CKV2_AWS_4 # REST stage execution logging: needs an account-level CloudWatch role + log storage; X-Ray tracing is enabled instead
  - CKV_AWS_285 # Step Functions execution logging (X-Ray tracing is enabled instead)
  - CKV2_AWS_39 # Route53 query logging
  - CKV2_AWS_38 # DNSSEC: needs a KMS CMK ($1/mo) + a DS record coordinated at the GoDaddy registrar; deliberately deferred even now that planetek.org's zone lives in Route53 (company-site)
  - CKV2_AWS_62 # S3 event notifications (nothing consumes them)

  # --- resilience knobs that don't fit ephemeral demo data ---
  - CKV_AWS_21 # S3 versioning on site buckets (every deploy would accumulate versions; state bucket IS versioned)
  - CKV2_AWS_61 # S3 lifecycle on site buckets (content is replaced wholesale on publish)
  - CKV_AWS_300 # abort-multipart lifecycle on the canary artifacts bucket (30-day expiry rule already set)
  - CKV_AWS_116 # Lambda DLQs (all invocations are synchronous request/response; nothing to dead-letter)
  - CKV_AWS_115 # Lambda reserved concurrency (abuse caps enforced via DynamoDB counters + edge throttle)
  - CKV_AWS_272 # Lambda code signing (terraform-hashed artifacts from a public repo)
  - CKV_AWS_338 # 1-year log retention: demo error logs are deliberately short-lived (14 days); traces TTL at 48h

  # --- plank 8's teardown stack (exists only during demo windows) ---
  - CKV_AWS_252 # CloudTrail SNS topic per log delivery: nothing would consume it; the evidence Lambda reads trail status via API
  - CKV2_AWS_10 # CloudTrail → CloudWatch Logs: ingestion + storage + an extra role for a trail that lives hours at a time; logs land in the KMS-encrypted, integrity-validated S3 bucket
  - CKV2_AWS_3 # GuardDuty org/all-region enablement: single-account demo detector, deployed for demo windows only by design

  # --- plank 9's teardown stack (exists only during demo windows) ---
  - CKV_AWS_88 # EC2 public IP: net-public-web IS the public-path exhibit (IGW → web tier :443, proven by Reachability Analyzer); granted per-instance, never as a subnet default
  - CKV_AWS_126 # EC2 detailed monitoring: $2.10/mo/instance for probes that live a few hours per demo window
  - CKV2_AWS_5 # net-data-sg attaches to nothing: the data tier is deliberately vacant (a third instance adds cost, not proof); the 5432 rule chain is still exercised by analyzer + probes
  - CKV2_AWS_1 # false positive: both NACLs attach to all six subnets via aws_network_acl_association, but the graph check can't trace references into count-instantiated subnets (verified minimal repro)

  # --- plank 11's teardown stack (Aurora exists only during demo windows) ---
  - CKV_AWS_327 # RDS cluster CMK: same $1/mo-CMK acceptance as everything else; storage IS encrypted (aws/rds managed key) and the cluster lives hours at a time
  - CKV_AWS_354 # Performance Insights CMK: same CMK acceptance; PI is on (free 7-day tier), encrypted with the AWS-managed key
  - CKV_AWS_139 # RDS deletion protection: this is THE teardown root — `make teardown` must destroy the cluster in one clean command
  - CKV_AWS_118 # enhanced monitoring: per-instance monitoring fees for a cluster that exists hours per demo window; Performance Insights + CloudWatch cover it
  - CKV2_AWS_27 # query logging (log_statement/log_min_duration): needs a custom cluster parameter group for a demo-window database of fictional data; the postgresql log export IS enabled
  - CKV2_AWS_57 # Secrets Manager rotation on the app-user secret: the secret is destroyed at teardown and regenerated (new random password) every demo cycle — that IS its rotation
  - CKV2_AWS_8 # AWS Backup plan for RDS: 7-day automated backups are on; the cluster is disposable by design and plank 10's drill demonstrates the backup/restore motion for the portfolio

  # --- intentional design ---
  - CKV_AWS_316 # CodeBuild privileged mode: required for docker build — the entire point of plank 4's image pipeline; the project only builds the fenced S3 source zip and can push only to its own ECR repo
  - CKV_AWS_51 # ECR mutable tags: the demo task definition tracks ctr-app:latest so image rebuilds need no task-def revision; only CodeBuild's fenced role can push (same acceptance as Trivy AVD-AWS-0031)
  - CKV_AWS_309 # API routes without auth: public-by-design routes (plank 3 entirely, /api/public/* elsewhere); money-spending routes use JWT authorizers
  - CKV2_AWS_71 # wildcard ACM cert: *.demos.planetek.org deliberately covers every plank site
  - CKV_AWS_374 # CloudFront geo restriction: public demos for anyone to view
  - CKV_AWS_174 # false positive: the default-cert block is the disabled branch of a dynamic block; the active branch pins TLSv1.2_2021
  - CKV_AWS_355 # canary role's cloudwatch:PutMetricData is namespace-conditioned; the action doesn't support resource ARNs
  - CKV2_AWS_51 # client-cert mTLS to the REST backend: the API is public by design (keys+plans are the exhibit); CloudFront is a routing convenience, not a trust boundary
