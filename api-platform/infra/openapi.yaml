# Single source of truth for the API contract. Terraform templatefile()s the
# Lambda invocation URIs in, yamldecode/jsonencode's it, and PUTs it into API
# Gateway; `make publish` strips the x-amazon-apigateway-* wiring and ships
# the same spec to the docs page as /openapi.json. Change the API here, and
# the gateway, the validators, and the docs all move together.
openapi: "3.0.1"
info:
  title: City of Alpenglow Developer API
  version: "2.0.0"
  description: >-
    Public REST API for the fictional City of Alpenglow, CO: permit records,
    business licenses, and parks & facilities, each served by its own
    microservice. v2 is current; v1 still works but answers with
    Deprecation/Sunset headers pointing at its successor. All endpoints except
    /v2/status and /v1/ping require an x-api-key header; the shared demo key
    is printed at https://api.demos.planetek.org.
  contact:
    name: Planetek
    url: https://demos.planetek.org

tags:
  - name: permits
    description: "Permits service: building/electrical/plumbing/etc. permit records, plus inspection requests (the only write surface: schema-validated by the gateway, auto-expiring after 24h)."
  - name: licenses
    description: "Licenses service: active and historical business licenses."
  - name: facilities
    description: "Facilities service: parks, trails, rec centers, libraries, pools, and their hours. v2-only, since it launched after the v1 deprecation."
  - name: platform
    description: "Keyless platform endpoints: live status and a mock-integration ping."

x-amazon-apigateway-api-key-source: HEADER

x-amazon-apigateway-request-validators:
  validate-body:
    validateRequestBody: true
    validateRequestParameters: false

# Friendly JSON for the failure modes the docs page demonstrates: missing key,
# schema-invalid body, throttle, quota, plus unmatched paths remapped from
# API Gateway's confusing default 403 to an honest 404.
x-amazon-apigateway-gateway-responses:
  INVALID_API_KEY:
    statusCode: 403
    responseTemplates:
      application/json: '{"error":"forbidden","message":"Missing or invalid x-api-key header. The shared demo key is printed at https://api.demos.planetek.org."}'
  MISSING_AUTHENTICATION_TOKEN:
    statusCode: 404
    responseTemplates:
      application/json: '{"error":"not_found","message":"No such endpoint. The full contract is at https://api.demos.planetek.org/openapi.json."}'
  BAD_REQUEST_BODY:
    statusCode: 400
    responseTemplates:
      application/json: '{"error":"validation_failed","message":"Request body failed schema validation (rejected by API Gateway before any code ran): $context.error.validationErrorString"}'
  THROTTLED:
    statusCode: 429
    responseTemplates:
      application/json: '{"error":"throttled","message":"Rate limit exceeded for this API key''s usage plan (demo tier: 2 req/s, burst 5). Slow down and retry."}'
  QUOTA_EXCEEDED:
    statusCode: 429
    responseTemplates:
      application/json: '{"error":"quota_exceeded","message":"This API key''s daily request quota is spent. The demo tier resets at midnight UTC."}'

paths:
  /v1/ping:
    get:
      tags: [platform]
      summary: Ping (mock integration)
      description: Answered entirely by an API Gateway mock integration. No compute behind it at all.
      responses:
        "200":
          description: Pong.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ping"
      x-amazon-apigateway-integration:
        type: mock
        requestTemplates:
          application/json: '{"statusCode": 200}'
        responses:
          default:
            statusCode: "200"
            responseTemplates:
              application/json: '{"message":"pong","integration":"mock","note":"this response is generated by API Gateway itself"}'

  /v1/permits:
    get:
      tags: [permits]
      summary: List permits (deprecated)
      deprecated: true
      description: Bare-array response, page capped at 50, no cursor. Replies carry Deprecation, Sunset, and Link successor-version headers. Use GET /v2/permits.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: type, in: query, required: false, schema: { $ref: "#/components/schemas/PermitType" } }
        - { name: status, in: query, required: false, schema: { $ref: "#/components/schemas/PermitStatus" } }
      responses:
        "200":
          description: Up to 50 permits, no pagination.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Permit" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}

  /v1/permits/{id}:
    get:
      tags: [permits]
      summary: Get a permit (deprecated)
      deprecated: true
      description: Bare-object response with deprecation headers. Use GET /v2/permits/{id}.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: PRM-2025-0104 }
      responses:
        "200":
          description: The permit.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Permit" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}

  /v1/licenses:
    get:
      tags: [licenses]
      summary: List business licenses (deprecated)
      deprecated: true
      description: Bare-array response with deprecation headers. Use GET /v2/licenses.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: category, in: query, required: false, schema: { $ref: "#/components/schemas/LicenseCategory" } }
        - { name: status, in: query, required: false, schema: { $ref: "#/components/schemas/LicenseStatus" } }
      responses:
        "200":
          description: Up to 50 licenses, no pagination.
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/License" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${licenses_uri}

  /v2/status:
    get:
      tags: [platform]
      summary: Platform status
      description: Keyless. Live health + approximate catalog size per microservice, read from DynamoDB table metadata only.
      responses:
        "200":
          description: Per-service status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PlatformStatus" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${status_uri}

  /v2/permits:
    get:
      tags: [permits]
      summary: List permits
      description: Cursor-paginated envelope. Filter with ?type= and ?status=; page with ?limit= (max 50) and the opaque meta.nextToken from the previous page.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: type, in: query, required: false, schema: { $ref: "#/components/schemas/PermitType" } }
        - { name: status, in: query, required: false, schema: { $ref: "#/components/schemas/PermitStatus" } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
        - { name: nextToken, in: query, required: false, schema: { type: string }, description: "Opaque cursor from the previous page's meta.nextToken." }
      responses:
        "200":
          description: One page of permits.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Permit" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}

  /v2/permits/{id}:
    get:
      tags: [permits]
      summary: Get a permit
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: PRM-2025-0104 }
      responses:
        "200":
          description: The permit, enveloped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Permit" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}

  /v2/permits/{id}/inspections:
    get:
      tags: [permits]
      summary: List inspection requests for a permit
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: PRM-2025-0104 }
      responses:
        "200":
          description: Inspection requests currently on file (visitor-created ones expire after 24h).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Inspection" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}
    post:
      tags: [permits]
      summary: Request an inspection
      description: >-
        The write surface, and the request-validation exhibit. API Gateway
        checks the body against the InspectionRequest model (required fields,
        enums, formats, no unknown properties) and rejects invalid payloads
        with a 400 before any Lambda runs. Created records expire
        automatically after 24 hours. Only approved or issued permits accept
        inspection requests (409 otherwise).
      security: [{ ApiKeyAuth: [] }]
      x-amazon-apigateway-request-validator: validate-body
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: PRM-2025-0104 }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/InspectionRequest" }
      responses:
        "201":
          description: Inspection request created (expires in 24h).
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Inspection" }
        "400":
          description: Body failed gateway schema validation. The Lambda never ran.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409":
          description: Permit exists but is not in an inspectable status.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${permits_uri}

  /v2/licenses:
    get:
      tags: [licenses]
      summary: List business licenses
      description: Cursor-paginated envelope. Filter with ?category= and ?status=.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: category, in: query, required: false, schema: { $ref: "#/components/schemas/LicenseCategory" } }
        - { name: status, in: query, required: false, schema: { $ref: "#/components/schemas/LicenseStatus" } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
        - { name: nextToken, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: One page of licenses.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/License" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${licenses_uri}

  /v2/licenses/{id}:
    get:
      tags: [licenses]
      summary: Get a business license
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: LIC-0042 }
      responses:
        "200":
          description: The license, enveloped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/License" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${licenses_uri}

  /v2/facilities:
    get:
      tags: [facilities]
      summary: List facilities
      description: Cursor-paginated envelope. Filter with ?kind=. Hours are on the /hours sub-resource.
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: kind, in: query, required: false, schema: { $ref: "#/components/schemas/FacilityKind" } }
        - { name: limit, in: query, required: false, schema: { type: integer, minimum: 1, maximum: 50, default: 20 } }
        - { name: nextToken, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: One page of facilities.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: "#/components/schemas/Facility" }
                  meta: { $ref: "#/components/schemas/PageMeta" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${facilities_uri}

  /v2/facilities/{id}:
    get:
      tags: [facilities]
      summary: Get a facility
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: FAC-009 }
      responses:
        "200":
          description: The facility, enveloped.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Facility" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${facilities_uri}

  /v2/facilities/{id}/hours:
    get:
      tags: [facilities]
      summary: Get a facility's hours
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, example: FAC-009 }
      responses:
        "200":
          description: Weekly hours plus any seasonal note.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/FacilityHours" }
        "404": { $ref: "#/components/responses/NotFound" }
      x-amazon-apigateway-integration:
        type: aws_proxy
        httpMethod: POST
        uri: ${facilities_uri}

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      name: x-api-key
      in: header
      description: Usage-plan API key. The shared demo-tier key is printed on the docs page; partner-tier keys are issued per integrator.

  responses:
    NotFound:
      description: No record with that id.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    PermitType:
      type: string
      enum: [building, electrical, plumbing, mechanical, sign, fence, solar, event]
    PermitStatus:
      type: string
      enum: [submitted, under-review, approved, issued, denied, closed]
    LicenseCategory:
      type: string
      enum: [food-service, retail, contractor, childcare, liquor, lodging, mobile-vendor]
    LicenseStatus:
      type: string
      enum: [active, expired, suspended]
    FacilityKind:
      type: string
      enum: [park, trail, rec-center, library, pool, sports-field]

    Permit:
      type: object
      properties:
        id: { type: string, example: PRM-2025-0104 }
        type: { $ref: "#/components/schemas/PermitType" }
        status: { $ref: "#/components/schemas/PermitStatus" }
        description: { type: string, example: 200A service upgrade }
        address: { type: string, example: 1420 Larkspur Ave }
        applicant: { type: string, example: Peak & Pine Electric }
        valuation: { type: integer, description: "USD", example: 12400 }
        submittedAt: { type: string, example: "2025-03-11" }

    License:
      type: object
      properties:
        id: { type: string, example: LIC-0042 }
        businessName: { type: string, example: Powderhound Coffee }
        category: { $ref: "#/components/schemas/LicenseCategory" }
        status: { $ref: "#/components/schemas/LicenseStatus" }
        address: { type: string, example: 210 Cirque St }
        issuedAt: { type: string, example: "2024-05-02" }
        expiresAt: { type: string, example: "2026-05-02" }

    Facility:
      type: object
      properties:
        id: { type: string, example: FAC-009 }
        name: { type: string, example: Cirque Recreation Center }
        kind: { $ref: "#/components/schemas/FacilityKind" }
        address: { type: string, example: 800 Summit Way }
        status: { type: string, example: open }

    FacilityHours:
      type: object
      properties:
        facilityId: { type: string, example: FAC-009 }
        name: { type: string, example: Cirque Recreation Center }
        hours:
          type: object
          description: "mon…sun → opening hours or 'closed'"
          additionalProperties: { type: string }
        seasonalNote: { type: string }

    InspectionRequest:
      type: object
      description: Enforced by API Gateway's request validator, not by application code.
      required: [type, preferredDate, contactEmail]
      additionalProperties: false
      properties:
        type:
          type: string
          enum: [footing, rough, electrical-service, plumbing-top-out, final]
        preferredDate:
          type: string
          pattern: '^\d{4}-\d{2}-\d{2}$'
          description: ISO date (YYYY-MM-DD).
        contactEmail:
          type: string
          pattern: '^[^@\s]+@[^@\s]+\.[^@\s]+$'
        notes:
          type: string
          maxLength: 500

    Inspection:
      type: object
      properties:
        id: { type: string, example: INSP-LZK4A2M01 }
        permitId: { type: string, example: PRM-2025-0104 }
        type: { type: string, example: rough }
        preferredDate: { type: string, example: "2026-08-01" }
        contactEmail: { type: string, example: inspector@example.com }
        notes: { type: string }
        status: { type: string, example: requested }
        requestedAt: { type: string, format: date-time }

    PageMeta:
      type: object
      properties:
        count: { type: integer, description: Items in this page. }
        nextToken: { type: string, description: Opaque cursor for the next page; absent on the last page. }

    Ping:
      type: object
      properties:
        message: { type: string, example: pong }
        integration: { type: string, example: mock }
        note: { type: string }

    PlatformStatus:
      type: object
      properties:
        status: { type: string, example: operational }
        apiVersions:
          type: object
          additionalProperties: { type: string }
        services:
          type: array
          items:
            type: object
            properties:
              name: { type: string, example: permits }
              status: { type: string, example: operational }
              approximateRecords: { type: integer, example: 240 }
        generatedAt: { type: string, format: date-time }

    Error:
      type: object
      properties:
        error: { type: string, example: not_found }
        message: { type: string }
