<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- The Osborne Firefinder: the lookout's sighting ring -->
  <rect width="64" height="64" rx="14" fill="#1a140c"/>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#e9c98a" stroke-width="2.5"/>
  <!-- cardinal ticks -->
  <line x1="32" y1="12" x2="32" y2="17" stroke="#e9c98a" stroke-width="2"/>
  <line x1="32" y1="47" x2="32" y2="52" stroke="#e9c98a" stroke-width="2"/>
  <line x1="12" y1="32" x2="17" y2="32" stroke="#e9c98a" stroke-width="2"/>
  <line x1="47" y1="32" x2="52" y2="32" stroke="#e9c98a" stroke-width="2"/>
  <!-- diagonal ticks -->
  <line x1="17.86" y1="17.86" x2="20.69" y2="20.69" stroke="#e9c98a" stroke-width="1.5"/>
  <line x1="46.14" y1="17.86" x2="43.31" y2="20.69" stroke="#e9c98a" stroke-width="1.5"/>
  <line x1="17.86" y1="46.14" x2="20.69" y2="43.31" stroke="#e9c98a" stroke-width="1.5"/>
  <line x1="46.14" y1="46.14" x2="43.31" y2="43.31" stroke="#e9c98a" stroke-width="1.5"/>
  <!-- sighting hairlines -->
  <line x1="15" y1="32" x2="49" y2="32" stroke="#f0e9d7" stroke-width="1.1" opacity=".85"/>
  <line x1="32" y1="15" x2="32" y2="49" stroke="#f0e9d7" stroke-width="1.1" opacity=".85"/>
  <!-- the ember -->
  <circle cx="32" cy="32" r="4" fill="#ec6a33"/>
</svg>
