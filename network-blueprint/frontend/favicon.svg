<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#16302e"/>
  <!-- subnet tiers -->
  <rect x="12" y="12" width="40" height="12" rx="4" fill="none" stroke="#8db9b3" stroke-width="2.5"/>
  <rect x="12" y="30" width="40" height="12" rx="4" fill="none" stroke="#8db9b3" stroke-width="2.5" stroke-dasharray="4 3"/>
  <!-- allowed path -->
  <line x1="24" y1="24" x2="24" y2="30" stroke="#34d399" stroke-width="3"/>
  <!-- blocked path -->
  <line x1="40" y1="24" x2="40" y2="30" stroke="#e4532f" stroke-width="3" stroke-dasharray="2.5 2.5"/>
  <!-- gateway endpoint dot -->
  <circle cx="32" cy="52" r="5" fill="#e4532f"/>
  <line x1="32" y1="42" x2="32" y2="47" stroke="#e4532f" stroke-width="3"/>
</svg>
